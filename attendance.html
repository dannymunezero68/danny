<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="attendancePanel">
    <div class="navbar">
        <div class="logo">
            <h3>KTSS Attendance System</h3>
        </div>
        <div class="nav-links">
            <span>Welcome,ADMIN <span id="loggedUser3"></span></span>
            <button class="nav-btn" onclick="loadPage('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="loadPage('students')">Students</button>
            <button class="nav-btn" onclick="loadPage('attendance')">Attendance</button>
            <button class="nav-btn" onclick="loadPage('reports')">Reports</button>
            <button class="nav-btn logout-btn" onclick="doLogout()">Logout</button>
        </div>
    </div>
    
    <div class="form-box">
        <h3>Mark Student Attendance</h3>
        <div class="form-row">
            <label>Select Date:</label>
            <input type="date" id="attendanceDate">
        </div>
        <div id="attendanceForm"></div>
        <button onclick="saveAttendanceMarking()" class="primary-btn">Save Attendance</button>
    </div>
</div>

<script src="storage.js"></script>
<script src="navigation.js"></script>
<script src="students.js"></script>
<script src="attendance.js"></script>
<script src="reports.js"></script>
<script src="dashboard.js"></script>
<script>
    if (typeof initStandalone === 'function') initStandalone();
</script>
</body>
</html>

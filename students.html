<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="script1.css">
</head>
<body>
<div id="studentsPanel">
    <div class="navbar">
        <div class="logo">
             <img src="Ly.svg" alt="Logo" class="logo-img-nav">
            <h3>Class Attendance System</h3>
        </div>
        <div class="nav-links">
            <span>Welcome, <span id="loggedUser2"></span></span>
            <button class="nav-btn" onclick="loadPage('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="loadPage('students')">Students</button>
            <button class="nav-btn" onclick="loadPage('attendance')">Attendance</button>
            <button class="nav-btn" onclick="loadPage('reports')">Reports</button>
            <button class="nav-btn logout-btn" onclick="doLogout()">Logout</button>
        </div>
    </div>
    
    <div class="form-box">
        <h3>Add New Student</h3>
        <form id="addStudentForm">
            <div class="form-row">
                <input type="text" id="studentFullName" placeholder="Full Name" required>
                <input type="text" id="studentClass" placeholder="Class (1st, 2nd, 3rd...)" required>
                <input type="text" id="studentRoll" placeholder="Roll Number" required>
                <input type="text" id="studentSection" placeholder="Section (A, B, C)" required>
            </div>
            <button type="submit" class="primary-btn">Add Student</button>
        </form>
    </div>
    
    <div class="form-box">
        <h3>Student List</h3>
        <div class="search-box">
            <input type="text" id="searchStudent" placeholder="Search by name or roll number" onkeyup="searchStudents()">
        </div>
        <div id="studentsTable"></div>
    </div>
</div>

<script src="storage.js"></script>
<script src="navigation.js"></script>
<script src="students.js"></script>
<script src="attendance.js"></script>
<script src="reports.js"></script>
<script src="dashboard.js"></script>
<script>
    if (typeof initStandalone === 'function') initStandalone();
</script>
</body>
</html>
